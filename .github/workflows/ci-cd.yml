# ============================================================
#  CI/CD Pipeline — Phase 5
#  Trigger: mỗi khi push lên branch main
#  Jobs: test → build → push Docker Hub
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/url-shortener

jobs:

  # ── Job 1: Chạy tests ────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt

      - name: Run tests
        run: |
          cd app && pytest -v --tb=short

  # ── Job 2: Build & Push Docker image ─────────────────────
  build:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    needs: test                          # chỉ chạy nếu test pass
    if: github.ref == 'refs/heads/main'  # chỉ trên branch main

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha           # tái sử dụng cache → build nhanh hơn
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "✅ Image pushed: ${{ env.IMAGE_NAME }}:${{ github.sha }}"
