global:
  scrape_interval: 15s      # thu thập metrics mỗi 15 giây
  evaluation_interval: 15s

scrape_configs:
  # Thu thập metrics từ FastAPI app
  - job_name: 'url-shortener'
    static_configs:
      - targets: ['app:8000']
    metrics_path: '/metrics'

  # Thu thập metrics từ chính Prometheus
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
