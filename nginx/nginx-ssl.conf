# ── Nginx Config — Phase 4: HTTPS ───────────────────────────
# Dùng sau khi đã chạy: make ssl-setup
# Đổi file này thành nginx.conf để bật HTTPS

events {
    worker_connections 1024;
}

http {
    # ── Logging ─────────────────────────────────────────────
    log_format main '$remote_addr [$time_local] "$request" '
                    '$status $body_bytes_sent rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Rate limiting ────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m     rate=10r/s;
    limit_req_zone $binary_remote_addr zone=shorten:10m rate=2r/s;

    # ── Upstream ─────────────────────────────────────────────
    upstream app_servers {
        server app:8000;
    }

    # ── Server 1: HTTP → redirect sang HTTPS ─────────────────
    server {
        listen 80;
        server_name localhost;

        # Chỉ cho phép health check qua HTTP
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Tất cả còn lại → redirect HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Server 2: HTTPS ──────────────────────────────────────
    server {
        listen 443 ssl;
        server_name localhost;

        # SSL certificates (tạo bằng mkcert)
        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # ── SSL hardening ────────────────────────────────────
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       10m;

        # ── Security headers ─────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options           "SAMEORIGIN";
        add_header X-Content-Type-Options    "nosniff";
        add_header X-XSS-Protection          "1; mode=block";

        client_max_body_size 1m;

        # ── Routes ───────────────────────────────────────────
        location /shorten {
            limit_req zone=shorten burst=5 nodelay;
            proxy_pass         http://app_servers;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /metrics {
            proxy_pass http://app_servers;
        }

        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://app_servers;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_read_timeout    30s;
        }
    }
}
