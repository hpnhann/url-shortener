# ── Nginx Config — Phase 3 (HTTP) → Phase 4 sẽ thêm HTTPS ──

events {
    worker_connections 1024;
}

http {
    # ── Logging ─────────────────────────────────────────────
    log_format main '$remote_addr - $request_method [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Rate limiting — chống spam ───────────────────────────
    # Mỗi IP tối đa 10 request/giây
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    # Endpoint shorten giới hạn chặt hơn: 2 request/giây
    limit_req_zone $binary_remote_addr zone=shorten:10m rate=2r/s;

    # ── Upstream — load balance (hiện chỉ 1 instance) ───────
    upstream app_servers {
        server app:8000;
        # Phase 6: thêm instance để scale
        # server app2:8000;
        # server app3:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # ── Security headers ─────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";

        # ── Giới hạn request size ────────────────────────────
        client_max_body_size 1m;

        # ── Route: API shorten — rate limit chặt ────────────
        location /shorten {
            limit_req zone=shorten burst=5 nodelay;
            proxy_pass http://app_servers;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Route: Metrics — chỉ cho internal ───────────────
        location /metrics {
            # Trong production: chặn từ bên ngoài
            # allow 172.0.0.0/8;  # Docker internal network
            # deny all;
            proxy_pass http://app_servers;
        }

        # ── Route: Tất cả còn lại ───────────────────────────
        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://app_servers;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout settings
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ── Health check cho Nginx ───────────────────────────
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
