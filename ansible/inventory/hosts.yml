# ── inventory/hosts.yml — Danh sách servers ─────────────────
# Ansible cần biết: SSH vào máy nào, dùng user gì, key gì
# Giống như danh bạ điện thoại của Ansible

all:
  children:

    # ── Nhóm: Web servers (Nginx) ────────────────────────────
    webservers:
      hosts:
        nginx_server:
          ansible_host: 127.0.0.1      # IP server (localhost để test)
          ansible_port: 2222           # SSH port
          ansible_user: ubuntu         # user SSH
          ansible_ssh_private_key_file: ~/.ssh/id_rsa

    # ── Nhóm: App servers (FastAPI) ─────────────────────────
    appservers:
      hosts:
        app_server:
          ansible_host: 127.0.0.1
          ansible_port: 2223
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_rsa

    # ── Nhóm: Database servers ───────────────────────────────
    dbservers:
      hosts:
        db_server:
          ansible_host: 127.0.0.1
          ansible_port: 2224
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_rsa

  # ── Biến chung cho tất cả hosts ─────────────────────────
  vars:
    ansible_python_interpreter: /usr/bin/python3
    project_name: url-shortener
    docker_compose_version: "2.24.0"
