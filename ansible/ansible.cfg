# ── ansible.cfg — Cấu hình Ansible ─────────────────────────
# File này Ansible tự đọc khi chạy trong cùng thư mục

[defaults]
# File inventory mặc định
inventory = inventory/hosts.yml

# Không check SSH host key (tiện cho dev/test)
host_key_checking = False

# Số lượng host chạy song song
forks = 10

# Format output đẹp hơn
stdout_callback = yaml

# Retry file khi task fail
retry_files_enabled = False

# Log file
log_path = /tmp/ansible.log

[ssh_connection]
# Giữ SSH connection để chạy nhanh hơn
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
