# ── ConfigMap: biến môi trường KHÔNG nhạy cảm ──────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: url-shortener-config
  namespace: url-shortener
data:
  DB_HOST: "postgres-service"   # tên Service của PostgreSQL
  DB_NAME: "urlshortener"
  DB_USER: "postgres"
  REDIS_HOST: "redis-service"   # tên Service của Redis

---
# ── Secret: biến môi trường NHẠY CẢM (base64 encoded) ──────
# Encode: echo -n "yourpassword" | base64
# Decode: echo "eW91cnBhc3N3b3Jk" | base64 -d
apiVersion: v1
kind: Secret
metadata:
  name: url-shortener-secret
  namespace: url-shortener
type: Opaque
data:
  # "supersecretpassword123" được encode base64
  DB_PASSWORD: c3VwZXJzZWNyZXRwYXNzd29yZDEyMw==
  GRAFANA_PASSWORD: YWRtaW4xMjM=
